<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f1117"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1e2330" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1e2330" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1e2330" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1e2330" stroke-width="1"/>
  <!-- Route arc illustration -->
  <path d="M 280 380 Q 600 180 920 380" stroke="#34d399" stroke-width="2.5" fill="none" opacity="0.5"/>
  <circle cx="280" cy="380" r="6" fill="#34d399" opacity="0.7"/>
  <circle cx="920" cy="380" r="6" fill="#34d399" opacity="0.7"/>
  <!-- Advisory zone blob -->
  <ellipse cx="600" cy="295" rx="90" ry="55" fill="#f59e0b" opacity="0.12"/>
  <ellipse cx="600" cy="295" rx="90" ry="55" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <!-- Wordmark -->
  <text x="600" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">Pathfinder</text>
  <!-- Tagline -->
  <text x="600" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#6b7280" text-anchor="middle" letter-spacing="0.5">Route disruption intelligence</text>
</svg>
